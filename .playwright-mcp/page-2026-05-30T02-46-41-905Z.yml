      - generic [ref=e23]:
        - paragraph [ref=e24]: "Y started with a stubborn idea: that Guildford's best nights shouldn't have to end with one venue closing its doors. So we built three — a cocktail bar, an open-air terrace, and a late-night club — each tuned for a different chapter of the same evening."
        - paragraph [ref=e25]: Six bars across the three sites. A roof terrace. A wood-fire pizza oven for the in-between hours. And Friday and Saturday line-ups that pull DJs and artists from across the UK to a town that knows how to throw a night.
        - paragraph [ref=e26]: Cocktails to start, terrace to settle in, club to finish — all a short walk apart. Whatever night you're after, we've got the room for it.
